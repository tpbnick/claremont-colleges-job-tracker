name: Scrape jobs

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:           # allow manual run from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/claremont_job_tracker.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/claremont_jobs_latest.json data/claremont_jobs_delta.json
          git diff --staged --quiet && echo "No changes to commit." || (git commit -m "chore: update job listings [skip ci]" && git push)
